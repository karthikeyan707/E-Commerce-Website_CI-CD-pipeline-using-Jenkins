apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 2
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - postgres
                topologyKey: topology.kubernetes.io/zone
      initContainers:
        - name: init-replication
          image: postgres:15-alpine
          command:
            - /bin/bash
            - -c
            - |
              if [ "$POD_NAME" != "postgres-0" ] && [ ! -f "$PGDATA/PG_VERSION" ]; then
                echo "Setting up replica from primary..."
                # Create pgpass file for authentication
                echo "postgres-0.postgres:5432:*:$POSTGRES_USER:$POSTGRES_PASSWORD" > ~/.pgpass
                chmod 600 ~/.pgpass
                until pg_isready -h postgres-0.postgres -p 5432 -U $POSTGRES_USER 2>/dev/null; do
                  echo "Waiting for primary to be ready..."
                  sleep 5
                done
                # Perform basebackup without password prompt (using pgpass)
                pg_basebackup -h postgres-0.postgres -p 5432 -U $POSTGRES_USER \
                  -D $PGDATA -Fp -Xs -P -v \
                  || echo "Basebackup completed or failed, continuing..."
                touch $PGDATA/standby.signal
                echo "primary_conninfo = 'host=postgres-0.postgres port=5432 user=$POSTGRES_USER password=$POSTGRES_PASSWORD'" >> $PGDATA/postgresql.auto.conf
                rm ~/.pgpass
              fi
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-credentials
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-credentials
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-config
            items:
              - key: init-multiple-databases.sh
                path: init-multiple-databases.sh
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        storageClassName: postgres-gp3-multi-az
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
